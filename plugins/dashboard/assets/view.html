<link rel="stylesheet" href="/plugins/dashboard/gridstack.min.css">

<style>
.dashboard-page {
  min-height: 100%;
  color: var(--oof-color-text);
}

.dashboard-shell {
  display: flex;
  flex-direction: column;
  gap: var(--oof-space-4);
  min-height: 100%;
}

.dash-toolbar {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--oof-space-4);
  padding: var(--oof-space-5);
  background:
    linear-gradient(135deg, rgb(var(--oof-color-accent-rgb) / .12), transparent 32%),
    linear-gradient(225deg, rgb(var(--oof-color-team-orange-rgb) / .10), transparent 30%),
    rgb(var(--oof-color-surface-rgb) / .96);
  border: 1px solid rgb(var(--oof-color-border-strong-rgb) / .86);
  border-radius: var(--oof-radius-xl);
  box-shadow: var(--oof-shadow-panel), var(--oof-shadow-inset);
  overflow: hidden;
}

.dash-toolbar::before {
  content: "";
  position: absolute;
  inset: 0;
  border-top: 1px solid rgb(var(--oof-color-accent-rgb) / .28);
  pointer-events: none;
}

.dash-toolbar-copy {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: var(--oof-space-1);
  min-width: 0;
}

.dash-toolbar-title {
  margin: 0;
  letter-spacing: 0;
}

.dash-toolbar-subtitle {
  max-width: 520px;
  margin: 0;
  color: var(--oof-color-text-muted);
  font-size: var(--oof-font-size-sm);
  line-height: var(--oof-line-height-normal);
}

.dash-toolbar-actions {
  position: relative;
  display: flex;
  align-items: center;
  gap: var(--oof-space-2);
  justify-content: flex-end;
  margin-left: auto;
}

.dashboard-canvas {
  flex: 1 1 auto;
  min-height: 0;
  padding: var(--oof-space-4);
  background:
    linear-gradient(180deg, rgb(var(--oof-color-surface-muted-rgb) / .78), rgb(var(--oof-color-bg-subtle-rgb) / .92)),
    rgb(var(--oof-color-bg-rgb) / .96);
  border: 1px solid rgb(var(--oof-color-border-rgb) / .9);
  border-radius: var(--oof-radius-xl);
  box-shadow: var(--oof-shadow-inset);
}

.dashboard-canvas-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--oof-space-3);
  padding: 0 0 var(--oof-space-3);
  color: var(--oof-color-text-subtle);
  font-size: var(--oof-font-size-xs);
}

.dashboard-canvas-title {
  color: var(--oof-color-text-muted);
  font-weight: var(--oof-font-weight-bold);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.dashboard-canvas-note {
  text-align: right;
}

#dash-grid.dash-editing {
  border-radius: var(--oof-radius-lg);
  background-image:
    linear-gradient(rgb(var(--oof-color-accent-rgb) / .08) 1px, transparent 1px),
    linear-gradient(90deg, rgb(var(--oof-color-accent-rgb) / .08) 1px, transparent 1px),
    radial-gradient(circle at top left, rgb(var(--oof-color-accent-rgb) / .10), transparent 34%);
  background-position: 0 0;
  background-size: 100% 66px, calc(100% / 12) 100%, 100% 100%;
  outline: 1px dashed rgb(var(--oof-color-accent-rgb) / .24);
  outline-offset: -1px;
}

/* Widget picker panel */
.dash-picker {
  position: fixed;
  top: var(--oof-space-4);
  right: var(--oof-space-4);
  width: min(340px, calc(100vw - (var(--oof-space-4) * 2)));
  height: 100vh;
  max-height: calc(100vh - (var(--oof-space-4) * 2));
  z-index: 200;
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(180deg, rgb(var(--oof-color-surface-raised-rgb) / .95), rgb(var(--oof-color-surface-rgb) / .98));
  border-color: rgb(var(--oof-color-accent-rgb) / .26);
  box-shadow: -18px 0 42px rgb(var(--oof-color-bg-rgb) / .5), var(--oof-shadow-panel);
}

.dash-picker.hidden {
  display: none;
}

.dash-picker-header {
  flex-shrink: 0;
  border-bottom-color: rgb(var(--oof-color-accent-rgb) / .22);
}

.dash-picker-close {
  background: none;
  border: none;
  color: var(--oof-color-text-muted);
  cursor: pointer;
  font-size: var(--oof-font-size-md);
  padding: 2px 6px;
  border-radius: var(--oof-radius-sm);
  line-height: 1;
}

.dash-picker-close:hover {
  color: var(--oof-color-text);
  background: var(--oof-color-surface-raised);
}

.dash-picker-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--oof-space-3);
  display: flex;
  flex-direction: column;
  gap: var(--oof-space-2);
}

.dash-picker-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--oof-space-2);
  padding: var(--oof-space-3);
  background: rgb(var(--oof-color-bg-rgb) / .26);
  border: 1px solid rgb(var(--oof-color-border-strong-rgb) / .78);
  border-radius: var(--oof-radius-md);
  box-shadow: var(--oof-shadow-inset);
}

.dash-picker-item:hover {
  border-color: rgb(var(--oof-color-accent-rgb) / .48);
}

.dash-picker-item-name {
  font-size: var(--oof-font-size-sm);
  font-weight: var(--oof-font-weight-semibold);
  color: var(--oof-color-text);
}

.dash-picker-item-plugin {
  font-size: var(--oof-font-size-xs);
  color: var(--oof-color-text-subtle);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.dash-picker-item .bc-sync-btn {
  min-height: 28px;
  padding: 4px 10px;
  border-color: rgb(var(--oof-color-accent-rgb) / .32);
  color: var(--oof-color-accent);
}

.dash-picker-empty {
  color: var(--oof-color-text-subtle);
  font-size: var(--oof-font-size-sm);
  line-height: var(--oof-line-height-normal);
  padding: var(--oof-space-6) var(--oof-space-3);
  text-align: center;
}

/* Empty state */
.dash-empty {
  margin: var(--oof-space-3) 0;
  background:
    linear-gradient(135deg, rgb(var(--oof-color-accent-rgb) / .08), transparent 38%),
    rgb(var(--oof-color-surface-rgb) / .72);
  border-style: dashed;
  border-color: rgb(var(--oof-color-border-strong-rgb) / .9);
}

.dash-empty strong {
  color: var(--oof-color-text);
}

.dash-empty-title {
  display: block;
  color: var(--oof-color-text);
  font-size: var(--oof-font-size-md);
  font-weight: var(--oof-font-weight-bold);
  line-height: var(--oof-line-height-tight);
}

.dash-empty-note {
  display: block;
  margin-top: var(--oof-space-1);
  color: var(--oof-color-text-muted);
  font-size: var(--oof-font-size-sm);
}

/* Widget item chrome */
.grid-stack-item-content {
  background:
    linear-gradient(180deg, rgb(var(--oof-color-surface-raised-rgb) / .52), transparent 58%),
    var(--oof-color-surface) !important;
  border: 1px solid rgb(var(--oof-color-border-strong-rgb) / .78) !important;
  border-radius: var(--oof-radius-panel) !important;
  box-shadow: var(--oof-shadow-inset), 0 12px 28px rgb(var(--oof-color-bg-rgb) / .28) !important;
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
  transition: border-color var(--oof-duration-fast), box-shadow var(--oof-duration-fast), transform var(--oof-duration-fast);
}

.grid-stack-item-content:hover {
  border-color: rgb(var(--oof-color-accent-rgb) / .36) !important;
}

.widget-header {
  display: flex;
  align-items: center;
  gap: var(--oof-space-2);
  cursor: default;
  user-select: none;
  flex-shrink: 0;
  background:
    linear-gradient(90deg, rgb(var(--oof-color-accent-rgb) / .14), transparent 36%),
    rgb(var(--oof-color-surface-raised-rgb) / .92);
  border-bottom: 1px solid rgb(var(--oof-color-border-strong-rgb) / .82);
}

.dash-editing .widget-header {
  cursor: move;
  background:
    linear-gradient(90deg, rgb(var(--oof-color-accent-rgb) / .18), transparent 42%),
    rgb(var(--oof-color-surface-raised-rgb) / .96);
}

.dash-editing .grid-stack-item-content {
  border-color: rgb(var(--oof-color-accent-rgb) / .42) !important;
  box-shadow: var(--oof-shadow-inset), 0 0 0 1px rgb(var(--oof-color-accent-rgb) / .08), 0 14px 34px rgb(var(--oof-color-bg-rgb) / .34) !important;
}

.widget-drag-icon {
  display: none;
  color: var(--oof-color-text-subtle);
  font-size: var(--oof-font-size-sm);
  font-weight: var(--oof-font-weight-bold);
  letter-spacing: 0;
  opacity: .75;
}

.dash-editing .widget-drag-icon {
  display: inline-flex;
}

.widget-title-text {
  flex: 1;
}

.widget-plugin-pill {
  flex: 0 0 auto;
  max-width: 120px;
  overflow: hidden;
  padding: 2px 7px;
  border: 1px solid rgb(var(--oof-color-border-strong-rgb) / .72);
  border-radius: 999px;
  background: rgb(var(--oof-color-bg-rgb) / .28);
  color: var(--oof-color-text-subtle);
  text-overflow: ellipsis;
}

.widget-remove-btn {
  display: none;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid transparent;
  color: var(--oof-color-text-muted);
  cursor: pointer;
  font-size: var(--oof-font-size-xs);
  min-width: 22px;
  min-height: 22px;
  padding: 2px 5px;
  border-radius: var(--oof-radius-sm);
  line-height: 1;
  opacity: .7;
}

.dash-editing .widget-remove-btn {
  display: inline-flex;
}

.widget-remove-btn:hover {
  opacity: 1;
  color: var(--oof-color-danger);
  border-color: rgb(var(--oof-color-danger-rgb) / .26);
  background: rgb(var(--oof-color-danger-rgb) / .12);
}

.widget-body {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* Resize handle */
.ui-resizable-se {
  bottom: 4px !important;
  right: 4px !important;
}

@media (max-width: 760px) {
  .dash-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .dash-toolbar-actions {
    width: 100%;
  }

  .dashboard-canvas-header {
    align-items: stretch;
    flex-direction: column;
  }

  .dashboard-canvas-note {
    text-align: left;
  }

  .dashboard-canvas {
    padding: var(--oof-space-3);
  }
}
</style>

<div id="dashboard-page" class="dashboard-page ui-page">
  <section id="dashboard-shell" class="dashboard-shell">
    <div id="dash-toolbar" class="dash-toolbar ui-page-header">
      <div class="dash-toolbar-copy">
        <div class="ui-page-kicker">Personal workspace</div>
        <h2 class="dash-toolbar-title ui-page-title">Dashboard</h2>
        <p class="dash-toolbar-subtitle">Keep your favorite live, session, rank, history, and utility panels in one place.</p>
      </div>
      <div class="dash-toolbar-actions ui-actions">
        <button id="dash-add-widget-btn" class="bc-sync-btn ui-button ui-button--ghost hidden">+ Add Widget</button>
        <button id="dash-cancel-btn" class="bc-sync-btn ui-button ui-button--ghost hidden">Cancel</button>
        <button id="dash-save-btn" class="btn-action ui-button ui-button--primary hidden">Save</button>
        <button id="dash-edit-btn" class="bc-sync-btn ui-button ui-button--ghost">Edit</button>
      </div>
    </div>

    <div id="dashboard-canvas" class="dashboard-canvas">
      <div class="dashboard-canvas-header">
        <span class="dashboard-canvas-title">My dashboard</span>
        <span class="dashboard-canvas-note">Your layout is saved after you edit and save.</span>
      </div>
      <div id="dash-empty" class="dash-empty ui-empty-state hidden">
        <span class="dash-empty-title">No widgets on this board yet.</span>
        <span class="dash-empty-note">Add widgets when you are ready to shape this workspace.</span>
      </div>
      <div class="grid-stack" id="dash-grid" style="min-height: 200px;"></div>
    </div>
  </section>

  <aside id="dash-picker" class="dash-picker ui-widget hidden" aria-label="Add dashboard widget">
    <div class="dash-picker-header ui-widget-header">
      <span class="ui-widget-title">Add Widget</span>
      <button id="dash-picker-close" class="dash-picker-close" aria-label="Close widget picker">x</button>
    </div>
    <div id="dash-picker-list" class="dash-picker-list ui-widget-body"></div>
  </aside>
</div>
