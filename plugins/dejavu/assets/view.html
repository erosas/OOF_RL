<div id="dejavu-page" class="ui-page dejavu-page">
  <style>
    .dejavu-page {
      display: flex;
      flex-direction: column;
      gap: var(--oof-space-4, 16px);
    }

    .dejavu-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--oof-space-4, 16px);
      padding-bottom: var(--oof-space-2, 8px);
      border-bottom: 1px solid rgb(var(--oof-color-border-rgb) / .78);
    }

    .dejavu-anchor {
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid var(--oof-color-border);
      border-radius: 8px;
      background: var(--surface2);
      text-align: right;
    }

    .dejavu-anchor-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .dejavu-anchor-value {
      display: block;
      margin-top: 3px;
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dejavu-empty {
      min-height: 260px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .dejavu-empty-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgb(var(--oof-color-accent-rgb) / .35);
      background: rgb(var(--oof-color-accent-rgb) / .12);
      color: var(--oof-color-accent);
      font-weight: 900;
      letter-spacing: 0;
    }

    .dejavu-empty-title {
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .dejavu-empty-copy {
      max-width: 640px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .dejavu-error {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgb(239 68 68 / .35);
      border-radius: 8px;
      background: rgb(239 68 68 / .09);
      color: #fca5a5;
      font-size: 13px;
      font-weight: 700;
    }

    .dejavu-retry-btn {
      flex: 0 0 auto;
      padding: 5px 10px;
      border: 1px solid rgb(239 68 68 / .45);
      border-radius: 8px;
      background: rgb(239 68 68 / .14);
      color: #fee2e2;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .dejavu-retry-btn:disabled {
      opacity: .65;
      cursor: default;
    }

    .dejavu-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--oof-space-3, 12px);
    }

    .dejavu-summary-item {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--oof-color-border);
      border-radius: 8px;
      background: var(--surface2);
    }

    .dejavu-summary-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .dejavu-summary-value {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
    }

    .dejavu-table-shell {
      overflow-x: auto;
      border: 1px solid var(--oof-color-border);
      border-radius: 8px;
      background: var(--surface);
    }

    .dejavu-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    .dejavu-table th,
    .dejavu-table td {
      padding: 11px 12px;
      border-bottom: 1px solid rgb(var(--oof-color-border-rgb) / .72);
      text-align: left;
      vertical-align: top;
    }

    .dejavu-table th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      background: var(--surface2);
    }

    .dejavu-table tr:last-child td {
      border-bottom: 0;
    }

    .dejavu-player-name {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      font-weight: 800;
    }

    .dejavu-player-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .dejavu-side-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 8px;
      border: 1px solid var(--oof-color-border);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
    }

    .dejavu-side-chip.teammate {
      border-color: rgb(74 158 255 / .35);
      background: rgb(74 158 255 / .12);
      color: #93c5fd;
    }

    .dejavu-side-chip.opponent {
      border-color: rgb(255 140 42 / .35);
      background: rgb(255 140 42 / .12);
      color: #fdba74;
    }

    .dejavu-metric-main {
      font-weight: 800;
      color: var(--text);
    }

    .dejavu-metric-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .dejavu-unavailable {
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .dejavu-header {
        align-items: stretch;
        flex-direction: column;
      }

      .dejavu-anchor {
        text-align: left;
      }

      .dejavu-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .dejavu-empty {
        align-items: flex-start;
      }

      .dejavu-summary {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <header class="dejavu-header">
    <div>
      <div class="ui-page-kicker">Prior saved-match recall</div>
      <h1 class="ui-page-title">Deja Vu</h1>
    </div>
    <div class="dejavu-anchor">
      <span class="dejavu-anchor-label">Session-selected tracked player</span>
      <span id="dejavu-anchor-value" class="dejavu-anchor-value">Not selected</span>
    </div>
  </header>

  <div id="dejavu-empty" class="dejavu-empty">
    <div class="dejavu-empty-icon">DV</div>
    <div>
      <div id="dejavu-empty-title" class="dejavu-empty-title">Loading history</div>
      <div id="dejavu-empty-copy" class="dejavu-empty-copy">Checking current roster and saved match history.</div>
    </div>
  </div>

  <div id="dejavu-content" class="dejavu-content hidden">
    <div id="dejavu-error" class="dejavu-error hidden"></div>
    <section id="dejavu-summary" class="dejavu-summary"></section>
    <div class="dejavu-table-shell">
      <table class="dejavu-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>Current side</th>
            <th>Prior</th>
            <th>Previously with</th>
            <th>Previously against</th>
            <th>Last seen</th>
          </tr>
        </thead>
        <tbody id="dejavu-rows"></tbody>
      </table>
    </div>
  </div>
</div>
