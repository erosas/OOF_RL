<div id="history-page" class="ui-page history-page">
  <div id="history-toolbar" class="ui-page-header history-toolbar">
    <div>
      <div class="ui-page-kicker">Saved matches</div>
      <h2 class="ui-page-title">Match History</h2>
    </div>
    <div class="history-toolbar-actions">
      <label class="ui-label" for="history-player-filter">Player</label>
      <select id="history-player-filter" class="ui-select history-player-filter">
        <option value="">All Players</option>
      </select>
    </div>
  </div>

  <div id="history-layout" class="history-layout">
    <section id="history-list-panel" class="ui-panel ui-panel--flush history-list-panel">
      <div class="history-panel-header">
        <div>
          <div class="ui-section-title">Match rail</div>
          <div class="history-panel-subtitle">Recent saved games</div>
        </div>
        <span id="history-match-count" class="history-count">0 matches</span>
      </div>
      <div id="matches-list" class="history-match-list"></div>
    </section>

    <section id="history-detail-panel" class="ui-panel ui-panel--flush history-detail-panel">
      <div id="history-detail-empty" class="history-detail-empty">
        <div class="history-empty-icon">-</div>
        <div>
          <div class="history-empty-title">No match selected</div>
          <div class="history-empty-copy">Choose a saved match to inspect stats, goals, and events.</div>
        </div>
      </div>
      <div id="history-detail-content-wrapper" class="history-detail-content-wrapper hidden">
        <div id="history-selected-summary"></div>
        <div id="history-selected-detail" class="history-selected-detail"></div>
      </div>
    </section>
  </div>
</div>
