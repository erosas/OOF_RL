<link rel="stylesheet" href="/plugins/dashboard/gridstack.min.css">

<style>
.dash-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 16px;
}
.dash-toolbar-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  opacity: 0.5;
  letter-spacing: 0.02em;
}
.dash-toolbar-actions { display: flex; align-items: center; gap: 8px; }

/* Widget picker panel */
.dash-picker {
  position: fixed;
  top: 0; right: 0;
  width: 260px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--line);
  z-index: 200;
  display: flex;
  flex-direction: column;
  box-shadow: -6px 0 24px rgba(0,0,0,0.5);
}
.dash-picker.hidden { display: none; }
.dash-picker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text);
}
.dash-picker-close {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.dash-picker-close:hover { color: var(--text); background: var(--surface2); }
.dash-picker-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.dash-picker-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--line);
  border-radius: 6px;
  gap: 8px;
}
.dash-picker-item-name {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
}
.dash-picker-item-plugin {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
}

/* Empty state */
.dash-empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.8;
}
.dash-empty strong { color: var(--text); opacity: 0.7; }

/* Widget item chrome */
.grid-stack-item-content {
  background: var(--surface) !important;
  border: 1px solid var(--line) !important;
  border-radius: 8px !important;
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
}
.widget-header {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 5px 10px;
  background: var(--surface2);
  border-bottom: 1px solid var(--line);
  border-radius: 7px 7px 0 0;
  cursor: move;
  user-select: none;
  flex-shrink: 0;
  min-height: 32px;
}
.dash-editing .widget-header { display: flex; }
.widget-drag-icon {
  color: var(--muted);
  font-size: 1rem;
  letter-spacing: -2px;
  opacity: 0.5;
}
.widget-title-text {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.widget-remove-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 2px 5px;
  border-radius: 3px;
  line-height: 1;
  opacity: 0.6;
}
.widget-remove-btn:hover { opacity: 1; color: var(--red); background: rgba(224,82,82,0.12); }
.widget-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  min-height: 0;
}

/* Resize handle */
.ui-resizable-se {
  bottom: 4px !important;
  right: 4px !important;
}
</style>

<div id="dash-toolbar" class="dash-toolbar">
  <span class="dash-toolbar-title">Dashboard</span>
  <div class="dash-toolbar-actions">
    <button id="dash-add-widget-btn" class="bc-sync-btn hidden">+ Add Widget</button>
    <button id="dash-cancel-btn"     class="bc-sync-btn hidden">Cancel</button>
    <button id="dash-save-btn"       class="btn-action hidden">Save</button>
    <button id="dash-edit-btn"       class="bc-sync-btn">Edit</button>
  </div>
</div>

<div id="dash-picker" class="dash-picker hidden">
  <div class="dash-picker-header">
    <span>Add Widget</span>
    <button id="dash-picker-close" class="dash-picker-close">✕</button>
  </div>
  <div id="dash-picker-list" class="dash-picker-list"></div>
</div>

<div id="dash-empty" class="dash-empty hidden">
  Click <strong>Edit</strong> then <strong>+ Add Widget</strong> to build your custom view.
</div>

<div class="grid-stack" id="dash-grid" style="min-height: 200px;"></div>
