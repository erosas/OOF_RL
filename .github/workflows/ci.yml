name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        shell: pwsh
        run: |
          # All packages are tested. Coverage instrumentation is limited to packages
          # where the numbers are meaningful — excluded packages are either untestable
          # without live infrastructure or have no application logic worth measuring:
          #   OOF_RL                  — app entry point / OS glue only
          #   OOF_RL/internal/overlay — Windows WebView2/CGO UI; requires a real window
          #   OOF_RL/internal/rl      — WebSocket client; core logic tested, live I/O not
          #   OOF_RL/tools/genicon    — one-off build tool
          $exclude = '^(OOF_RL|OOF_RL/internal/overlay|OOF_RL/internal/rl|OOF_RL/tools/genicon)$'
          $coverpkgs = (go list ./... | Where-Object { $_ -notmatch $exclude }) -join ','
          # Quote -coverpkg: PowerShell mangles an unquoted `-flag=$var` whose value
          # contains commas, so Go matched no packages and wrote an empty profile
          # ("coverage: [no statements]"), leaving the Codecov badge blank.
          go test "-coverprofile=$env:RUNNER_TEMP/coverage.out" "-coverpkg=$coverpkgs" ./...

      - name: Run SDK and plugin module tests
        shell: pwsh
        run: |
          go -C sdk test ./...
          go -C plugins/live test ./...
          go -C plugins/ballchasing test ./...
          go -C plugins/ranks test ./...
          go -C plugins/session test ./...
          go -C plugins/dashboard test ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ runner.temp }}/coverage.out
          fail_ci_if_error: false

  # ── Release package ───────────────────────────────────────────────────────
  # Runs when a version tag is pushed. A plain tag (v1.2.3) is a stable release;
  # a semver-prerelease tag (v1.2.3-dev.1) is a dev release — published as a
  # GitHub prerelease so it stays out of regular users' releases/latest, while
  # the rolling "dev" pointer is refreshed on every release so dev-mode users
  # see the newest build of either kind. See docs/dev/auto-update.md.
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release package
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version "${{ github.ref_name }}"

      # A prerelease tag carries a semver prerelease suffix (the '-' in
      # v1.2.3-dev.1); a plain v1.2.3 is stable.
      - name: Determine channel
        id: channel
        shell: pwsh
        run: |
          $prerelease = if ('${{ github.ref_name }}' -match '-') { 'true' } else { 'false' }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "prerelease=$prerelease"

      # Third-party actions in this job are pinned to commit SHAs: it has
      # contents:write and publishes the binaries users run, so a hijacked
      # version tag on the action repo must not be able to inject code here.
      - name: VirusTotal scan
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        id: virustotal
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: dist/OOF_RL/oof_rl.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          prerelease: ${{ steps.channel.outputs.prerelease == 'true' }}
          files: |
            dist/OOF_RL-${{ github.ref_name }}.zip
            dist/OOF_RL-${{ github.ref_name }}.zip.sha256
            dist/update-manifest.json
          generate_release_notes: true
          body: |
            Download the release zip, extract it, and run `install.ps1` from the extracted `OOF_RL` folder (right-click → Run with PowerShell, or `powershell -ExecutionPolicy Bypass -File install.ps1`). It installs or updates in place, creates a Start Menu shortcut, and launches the app — your data is untouched. You can also skip the script and run `oof_rl.exe` straight from the folder.

            The public WASM plugins and assets for Live, Ranks, Session, and Dashboard are built into `oof_rl.exe`, so it runs fully self-contained — no separate plugins folder needed.

            **VirusTotal scan:** ${{ steps.virustotal.outputs.analysis }}

      # Point the dev channel at this build. The "dev" release is a single
      # rolling prerelease whose manifest asset is overwritten on every release
      # (dev and stable), so dev-mode clients polling it are offered the newest
      # build of either kind. Download links in the manifest resolve to the
      # versioned release created above; this release only carries the pointer.
      - name: Refresh rolling dev pointer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view dev 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create dev --prerelease --title "dev (rolling)" `
              --notes "Rolling pointer to the latest build for dev-mode auto-update. Download links live on the versioned releases."
          }
          gh release upload dev dist/update-manifest.json --clobber
