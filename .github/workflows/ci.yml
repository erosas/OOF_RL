name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        shell: pwsh
        run: |
          # All packages are tested. Coverage instrumentation is limited to packages
          # where the numbers are meaningful — excluded packages are either untestable
          # without live infrastructure or have no application logic worth measuring:
          #   OOF_RL                  — app entry point / OS glue only
          #   OOF_RL/internal/overlay — Windows WebView2/CGO UI; requires a real window
          #   OOF_RL/internal/rl      — WebSocket client; core logic tested, live I/O not
          #   OOF_RL/tools/genicon    — one-off build tool
          $exclude = '^(OOF_RL|OOF_RL/internal/overlay|OOF_RL/internal/rl|OOF_RL/tools/genicon)$'
          $coverpkgs = (go list ./... | Where-Object { $_ -notmatch $exclude }) -join ','
          # Quote -coverpkg: PowerShell mangles an unquoted `-flag=$var` whose value
          # contains commas, so Go matched no packages and wrote an empty profile
          # ("coverage: [no statements]"), leaving the Codecov badge blank.
          go test "-coverprofile=$env:RUNNER_TEMP/coverage.out" "-coverpkg=$coverpkgs" ./...

      - name: Run SDK and plugin module tests
        shell: pwsh
        run: |
          go -C sdk test ./...
          go -C plugins/live test ./...
          go -C plugins/ballchasing test ./...
          go -C plugins/ranks test ./...
          go -C plugins/session test ./...
          go -C plugins/dashboard test ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ runner.temp }}/coverage.out
          fail_ci_if_error: false

  # ── Release package ───────────────────────────────────────────────────────
  # Only runs when a version tag (e.g. v1.2.3) is pushed.
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release package
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version "${{ github.ref_name }}"

      # Third-party actions in this job are pinned to commit SHAs: it has
      # contents:write and publishes the binaries users run, so a hijacked
      # version tag on the action repo must not be able to inject code here.
      - name: VirusTotal scan
        uses: crazy-max/ghaction-virustotal@d34968c958ae283fe976efed637081b9f9dcf74f # v4
        id: virustotal
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: dist/OOF_RL/oof_rl.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/OOF_RL-${{ github.ref_name }}.zip
            dist/OOF_RL-${{ github.ref_name }}.zip.sha256
            dist/update-manifest.json
          generate_release_notes: true
          body: |
            Download the release zip, extract it, and run `install.ps1` from the extracted `OOF_RL` folder (right-click → Run with PowerShell, or `powershell -ExecutionPolicy Bypass -File install.ps1`). It installs or updates in place, creates a Start Menu shortcut, and launches the app — your data is untouched. You can also skip the script and run `oof_rl.exe` straight from the folder.

            The public WASM plugins and assets for Live, Ranks, Session, and Dashboard are built into `oof_rl.exe`, so it runs fully self-contained — no separate plugins folder needed.

            **VirusTotal scan:** ${{ steps.virustotal.outputs.analysis }}
