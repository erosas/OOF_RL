name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  # ── Release binary ────────────────────────────────────────────────────────
  # Only runs when a version tag (e.g. v1.2.3) is pushed.
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        # -H windowsgui suppresses the console window for end-users.
        # -s -w strips debug info for a smaller binary.
        run: go build -ldflags="-H windowsgui -s -w" -o oof_rl.exe .

      - name: Generate checksum
        run: |
          $hash = (Get-FileHash oof_rl.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  oof_rl.exe" | Out-File -Encoding utf8 oof_rl.exe.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            oof_rl.exe
            oof_rl.exe.sha256
          generate_release_notes: true